# Dongle-specific config
# USB is the host-side transport; BLE is used only for connecting to the two halves.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Dongle is USB-powered — no need for deep sleep
CONFIG_ZMK_SLEEP=n

# Disable USB logging (re-enable temporarily for debugging if needed)
CONFIG_ZMK_USB_LOGGING=n
